<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile & Settings – Student Planner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="profile-page">
    <p class="back-to-login"><a href="index.html">← Back to Login</a></p>
    <h1>Profile & Settings</h1>

    <section class="profile-section">
      <h2>Profile Information</h2>
      <div class="profile-info">
        <p><strong>Name:</strong> Alex Johnson</p>
        <p><strong>Email:</strong> alex@student.com</p>
      </div>
    </section>

    <section class="profile-section">
      <h2>Preferences</h2>
      <div class="preference-row">
        <span>Dark Mode</span>
        <div class="toggle-buttons">
          <button type="button" class="toggle-btn active">ON</button>
          <button type="button" class="toggle-btn">OFF</button>
        </div>
      </div>
      <div class="preference-row">
        <label class="checkbox-option">
          <input type="checkbox" name="reminders" checked>
          Send email reminders for deadlines
        </label>
      </div>
    </section>

    <section class="profile-section">
      <button type="button" class="logout-btn">Logout</button>
    </section>
  </main>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> Home</a>
    <a href="add-task.html" class="nav-item"><span class="nav-icon">➕</span> Add Task</a>
    <a href="profile.html" class="nav-item active"><span class="nav-icon">👤</span> Profile</a>
  </nav>
</body>
</html>

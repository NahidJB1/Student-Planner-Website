<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Student Planner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="login-page">
    <header class="login-header">
      <h1>📚 Student Planner</h1>
    </header>
    <div class="login-form-container">
      <form class="login-form" action="dashboard.html" method="get">
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit" class="login-btn">Login</button>
      </form>
      <p class="login-signup-link">Don't have an account? <a href="#">Sign Up</a></p>
      <p class="login-browse-pages">View pages: <a href="dashboard.html">Dashboard</a> · <a href="add-task.html">Add Task</a> · <a href="profile.html">Profile</a></p>
    </div>
  </main>
</body>
</html>

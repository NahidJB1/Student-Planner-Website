<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Task – Student Planner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="add-task-page">
    <p class="back-to-login"><a href="index.html">← Back to Login</a></p>
    <h1>Add New Task</h1>

    <div class="add-task-form-container">
      <form class="add-task-form">
        <div class="form-group">
          <label for="task-title">Task Title</label>
          <input type="text" id="task-title" name="title" placeholder="e.g., HCI Essay">
        </div>
        <div class="form-group">
          <label for="course-name">Course Name</label>
          <input type="text" id="course-name" name="course" placeholder="e.g., Human Computer Interaction">
        </div>
        <div class="form-group">
          <label for="due-date">Due Date</label>
          <input type="date" id="due-date" name="dueDate">
        </div>
        <div class="form-group">
          <label>Priority</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="priority" value="low">
              Low
            </label>
            <label class="radio-option">
              <input type="radio" name="priority" value="medium" checked>
              Medium
            </label>
            <label class="radio-option">
              <input type="radio" name="priority" value="high">
              High
            </label>
          </div>
        </div>
        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" placeholder="Additional details..."></textarea>
        </div>
        <button type="submit" class="add-task-btn">Add Task</button>
        <a href="dashboard.html" class="cancel-link">Cancel</a>
      </form>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> Home</a>
    <a href="add-task.html" class="nav-item active"><span class="nav-icon">➕</span> Add Task</a>
    <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span> Profile</a>
  </nav>
</body>
</html>

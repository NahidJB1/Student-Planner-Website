<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Task – Student Planner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="add-task-page fade-in-animation">
    <header class="dashboard-header">
      <div class="header-top">
        <p class="back-to-login"><a href="dashboard.html">← Back to Dashboard</a></p>
      </div>
      <div class="welcome-section">
        <h1>Add New Task</h1>
        <p class="subtitle dashboard-subtitle">Fill in the details for your upcoming assignment.</p>
      </div>
    </header>

    <div class="add-task-form-container modern-card">
      <form class="add-task-form" action="dashboard.html" method="get">
        
        <div class="form-grid">
          <div class="form-group">
            <label for="task-title">Task Title</label>
            <input type="text" id="task-title" name="title" placeholder="e.g., HCI Essay" required>
          </div>
          <div class="form-group">
            <label for="course-name">Course Name</label>
            <input type="text" id="course-name" name="course" placeholder="e.g., Human Computer Interaction" required>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="due-date">Due Date</label>
            <input type="date" id="due-date" name="dueDate" required>
          </div>
          <div class="form-group">
            <label>Priority</label>
            <div class="modern-radio-group">
              <label class="priority-pill low">
                <input type="radio" name="priority" value="low">
                <span>Low</span>
              </label>
              <label class="priority-pill medium">
                <input type="radio" name="priority" value="medium" checked>
                <span>Med</span>
              </label>
              <label class="priority-pill high">
                <input type="radio" name="priority" value="high">
                <span>High</span>
              </label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea id="notes" name="notes" placeholder="Additional details..."></textarea>
        </div>

        <div class="form-actions">
          <a href="dashboard.html" class="cancel-btn">Cancel</a>
          <button type="submit" class="add-task-btn">Add Task</button>
        </div>
      </form>
    </div>
  </main>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> Home</a>
    <a href="add-task.html" class="nav-item active"><span class="nav-icon">➕</span> Add Task</a>
    <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span> Profile</a>
  </nav>
</body>
</html>

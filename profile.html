<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile & Settings – Student Planner</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="profile-page fade-in-animation">
    <header class="dashboard-header">
      <div class="header-top">
        <p class="back-to-login"><a href="dashboard.html">← Back to Dashboard</a></p>
      </div>
      <div class="welcome-section profile-header-flex">
        <div>
          <h1>Profile & Settings ⚙️</h1>
          <p class="subtitle dashboard-subtitle">Manage your account and preferences.</p>
        </div>
        <div class="avatar-circle">AJ</div>
      </div>
    </header>

    <section class="profile-section modern-card">
      <div class="section-header">
        <h2 class="section-title">Account Details</h2>
      </div>
      <div class="profile-info">
        <div class="info-row">
          <span class="info-label">Full Name</span>
          <span class="info-value">Alex Johnson</span>
        </div>
        <div class="info-row">
          <span class="info-label">Email Address</span>
          <span class="info-value">alex@student.com</span>
        </div>
      </div>
    </section>

    <section class="profile-section modern-card">
      <div class="section-header">
        <h2 class="section-title">Preferences</h2>
      </div>
      <div class="preference-list">
        <div class="preference-row">
          <div class="pref-text">
            <strong>Dark Mode</strong>
            <span>Switch to a dark theme</span>
          </div>
          <div class="toggle-buttons">
            <button type="button" class="toggle-btn active">ON</button>
            <button type="button" class="toggle-btn">OFF</button>
          </div>
        </div>
        <div class="preference-row">
          <label class="checkbox-option">
            <div class="pref-text">
              <strong>Email Reminders</strong>
              <span>Get notified before deadlines</span>
            </div>
            <input type="checkbox" name="reminders" checked>
          </label>
        </div>
      </div>
    </section>

    <a href="index.html" class="logout-btn-modern">Log Out</a>
  </main>

 <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span> Home</a>
    <a href="add-task.html" class="nav-item"><span class="nav-icon">➕</span> Add Task</a>
    <a href="analytics.html" class="nav-item"><span class="nav-icon">📊</span> Insights</a>
    <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span> Profile</a>
  </nav>
</body>
</html>
